<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Tính Giá Flamingo Cát Bà - Level 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; line-height: 1.6; }
        .container { max-width: 1000px; margin: 30px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; text-transform: uppercase; margin-bottom: 5px; font-size: 26px; }
        h2 { color: #2d3748; font-weight: normal; margin-top: 0; margin-bottom: 30px; font-size: 20px; }
        
        #data-status { font-weight: bold; margin-bottom: 25px; padding: 10px; border-radius: 6px; display: inline-block; }

        /* Form styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #4a5568; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; outline: none; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #1a365d; box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1); }

        .full-width { grid-column: span 2; }
        .mode-selector { background: #edf2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 30px; align-items: center; justify-content: center; }
        .mode-selector label { cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        /* Custom Discount Table */
        .custom-discount-box { background: #fffaf0; border: 1px dashed #ed8936; padding: 20px; border-radius: 8px; margin-top: 10px; display: none; }
        .custom-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .custom-table input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-add { background: #2b6cb0; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-remove { background: #e53e3e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        .btn-main { background: #1a365d; color: white; border: none; padding: 18px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-main:hover { background: #2c5282; transform: translateY(-2px); }

        /* Result styling */
        #result-box { display: none; margin-top: 40px; padding-top: 30px; border-top: 2px solid #edf2f7; text-align: left; }
        .result-header { text-align: center; color: #1a365d; border-bottom: 2px solid #1a365d; padding-bottom: 10px; margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-item { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .info-item span { color: #718096; }
        .info-item strong { color: #2d3748; }
        
        .price-highlight { background: #fff5f5; padding: 20px; border-radius: 8px; border: 1px solid #feb2b2; margin-bottom: 30px; }
        .final-price { color: #e53e3e; font-size: 28px; font-weight: bold; }

        .discount-detail { font-size: 14px; color: #4a5568; margin-top: 10px; padding-left: 20px; border-left: 3px solid #1a365d; }

        /* Timeline for 30-day payment */
        .milestone-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .milestone { background: #ebf8ff; padding: 15px; border-left: 5px solid #3182ce; border-radius: 4px; }
        
        table.schedule-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .schedule-table th { background: #1a365d; color: white; padding: 12px; }
        .schedule-table td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        .schedule-table tr:nth-child(even) { background: #f7fafc; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <h1>Bảng tính giá & Tiến độ thanh toán</h1>
        <h2>Dự án Flamingo Cát Bà Beach Resort</h2>
        <div id="data-status">Đang tải dữ liệu...</div>
    </div>

    <div class="mode-selector">
        <label><input type="radio" name="calc-mode" value="auto" checked onchange="toggleMode()"> TÍNH TỰ ĐỘNG (FLOW CHUẨN)</label>
        <label><input type="radio" name="calc-mode" value="custom" onchange="toggleMode()"> TÙY CHỈNH NGOẠI GIAO</label>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label>Tên khách hàng</label>
            <input type="text" id="fullname" placeholder="Họ và tên...">
        </div>
        <div class="form-group">
            <label>Mã căn hộ</label>
            <input type="text" id="apt-code" placeholder="Ví dụ: V2.204">
        </div>
        <div class="form-group">
            <label>Nhóm sản phẩm</label>
            <select id="apt-group" onchange="checkSpecialConditions()">
                <option value="1PN">Căn Studio / 1PN</option>
                <option value="2PN">Căn hộ 2PN / 3PN</option>
            </select>
        </div>
        <div class="form-group">
            <label>Phương thức thanh toán</label>
            <select id="payment-plan" onchange="checkSpecialConditions()">
                <option value="36">Tiến độ chuẩn 36 tháng</option>
                <option value="12">Tiến độ 12 tháng (CK 7%)</option>
                <option value="30">Thanh toán nhanh 30 ngày (CK 12%)</option>
            </select>
        </div>
        <div class="form-group full-width" id="cond-50-box" style="display:none; flex-direction: row; align-items: center; gap: 10px; background: #fff5f5; padding: 10px; border-radius: 5px;">
            <input type="checkbox" id="pay50-first" style="width: 20px; height: 20px;">
            <label for="pay50-first" style="margin: 0; color: #c53030;">Khách cam kết thanh toán 50% ngay đợt 1 (Để nhận CK 5%)</label>
        </div>
    </div>

    <div id="custom-discount-box" class="custom-discount-box">
        <label style="font-weight: bold;">Danh sách chiết khấu thêm (%):</label>
        <table class="custom-table">
            <thead><tr><th>Nội dung</th><th>Tỷ lệ %</th><th></th></tr></thead>
            <tbody id="custom-body">
                <tr>
                    <td><input type="text" class="c-name" placeholder="Ví dụ: Voucher quà tặng"></td>
                    <td><input type="number" class="c-rate" value="0" step="0.1"></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
        <button class="btn-add" onclick="addRow()">+ Thêm dòng</button>
    </div>

    <button class="btn-main" onclick="calculate()">TẠO PHIẾU TÍNH GIÁ</button>

    <div id="result-box">
        <h3 class="result-header">PHIẾU TÍNH GIÁ DỰ KIẾN</h3>
        <div class="info-grid">
            <div class="info-item"><span>Khách hàng:</span> <strong id="out-name"></strong></div>
            <div class="info-item"><span>Mã căn:</span> <strong id="out-code"></strong></div>
            <div class="info-item"><span>Loại căn:</span> <strong id="out-type"></strong></div>
            <div class="info-item"><span>Diện tích:</span> <strong id="out-area"></strong> m2</div>
        </div>

        <div class="price-highlight">
            <div class="info-item" style="border:none"><span>Giá bán niêm yết:</span> <strong id="out-price-raw"></strong></div>
            <div id="discount-breakdown" class="discount-detail"></div>
            <div class="info-item" style="border:none; margin-top: 15px;">
                <span style="font-size: 20px; color: #333;">GIÁ SAU CHIẾT KHẤU:</span>
                <span class="final-price" id="out-price-final"></span>
            </div>
        </div>

        <h3 id="schedule-title">Tiến độ thanh toán chi tiết</h3>
        <div id="schedule-content"></div>
    </div>
</div>

<script>
    let masterData = [];

    window.onload = () => {
        fetch('Data.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                masterData = Array.isArray(data) ? data : data[Object.keys(data)[0]];
                document.getElementById('data-status').innerHTML = "🟢 Hệ thống sẵn sàng";
                document.getElementById('data-status').style.color = "green";
            })
            .catch(() => {
                document.getElementById('data-status').innerHTML = "🔴 Lỗi tải Data.json";
                document.getElementById('data-status').style.color = "red";
            });
    };

    function toggleMode() {
        const mode = document.querySelector('input[name="calc-mode"]:checked').value;
        document.getElementById('custom-discount-box').style.display = (mode === 'custom' ? 'block' : 'none');
    }

    function addRow() {
        const row = `<tr>
            <td><input type="text" class="c-name" placeholder="..."></td>
            <td><input type="number" class="c-rate" value="0" step="0.1"></td>
            <td><button class="btn-remove" onclick="this.closest('tr').remove()">x</button></td>
        </tr>`;
        document.getElementById('custom-body').insertAdjacentHTML('beforeend', row);
    }

    function checkSpecialConditions() {
        const group = document.getElementById('apt-group').value;
        const plan = document.getElementById('payment-plan').value;
        // Hiện checkbox 50% nếu chọn 2PN và KHÔNG PHẢI thanh toán 30 ngày
        document.getElementById('cond-50-box').style.display = (group === '2PN' && plan !== '30') ? 'flex' : 'none';
    }

    function formatMoney(num) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(num);
    }

    function calculate() {
        const codeInput = document.getElementById('apt-code').value.toUpperCase().trim();
        const apt = masterData.find(i => String(i.ma_can || i.ID).toUpperCase().trim() === codeInput);
        
        if (!apt) return alert("Không tìm thấy mã căn hộ này!");

        const mode = document.querySelector('input[name="calc-mode"]:checked').value;
        const group = document.getElementById('apt-group').value;
        const plan = document.getElementById('payment-plan').value;
        const pay50 = document.getElementById('pay50-first').checked;

        let price = Number(apt.gia_tien || apt.gia_ban || 0);
        let breakdown = "";
        
        // --- LOGIC CHIẾT KHẤU 1 (CĂN HỘ) ---
        let ck1 = 0;
        if (group === '2PN' && (pay50 || plan === '30')) {
            ck1 = 0.05;
            breakdown += `• Chiết khấu căn 2PN/3PN (50% đợt 1): -5% (${formatMoney(price * 0.05)})<br>`;
            price *= 0.95;
        }

        // --- LOGIC CHIẾT KHẤU 2 (TIẾN ĐỘ) ---
        if (mode === 'auto') {
            if (plan === '12') {
                breakdown += `• Chiết khấu thanh toán 12 tháng: -7% (${formatMoney(price * 0.07)})<br>`;
                price *= 0.93;
            } else if (plan === '30') {
                breakdown += `• Chiết khấu thanh toán nhanh 30 ngày: -12% (${formatMoney(price * 0.12)})<br>`;
                price *= 0.88;
            }
        } else {
            // Chế độ tùy chỉnh
            const names = document.querySelectorAll('.c-name');
            const rates = document.querySelectorAll('.c-rate');
            names.forEach((n, idx) => {
                let r = parseFloat(rates[idx].value) / 100;
                if (r > 0) {
                    breakdown += `• ${n.value || 'CK bổ sung'}: -${rates[idx].value}% (${formatMoney(price * r)})<br>`;
                    price *= (1 - r);
                }
            });
        }

        // Hiển thị thông tin chung
        document.getElementById('out-name').innerText = document.getElementById('fullname').value || "Khách hàng";
        document.getElementById('out-code').innerText = codeInput;
        document.getElementById('out-type').innerText = apt.Type || apt.loai_can || "N/A";
        document.getElementById('out-area').innerText = apt.dien_tich || 0;
        document.getElementById('out-price-raw').innerText = formatMoney(Number(apt.gia_tien || apt.gia_ban));
        document.getElementById('out-price-final').innerText = formatMoney(price);
        document.getElementById('discount-breakdown').innerHTML = breakdown || "Không có chiết khấu áp dụng.";

        renderSchedule(group, plan, pay50, price);
        document.getElementById('result-box').style.display = 'block';
        window.scrollTo({ top: document.getElementById('result-box').offsetTop, behavior: 'smooth' });
    }

    function renderSchedule(group, plan, pay50, finalPrice) {
        const container = document.getElementById('schedule-content');
        container.innerHTML = "";
        const deposit = 100000000;

        // Xử lý thanh toán nhanh 30 ngày (Trình bày Milestone)
        if (plan === '30') {
            container.innerHTML = `
                <div class="milestone-container">
                    <div class="milestone"><strong>1. Đặt cọc:</strong> ${formatMoney(deposit)} (Ký thỏa thuận đặt cọc)</div>
                    <div class="milestone"><strong>2. Trong vòng 30 ngày:</strong> Thanh toán 95% GTCH (Đã gồm cọc) <br> 
                        👉 Số tiền cần đóng: <b style="color:#2b6cb0">${formatMoney(finalPrice * 0.95 - deposit)}</b></div>
                    <div class="milestone"><strong>3. Khi nhận thông báo GCN:</strong> 5% còn lại <br>
                        👉 Số tiền: <b style="color:#2b6cb0">${formatMoney(finalPrice * 0.05)}</b></div>
                </div>`;
            return;
        }

        // Xác định bảng dữ liệu dựa theo file Word
        let steps = [];
        if (group === '2PN' && pay50) {
            if (plan === '12') {
                steps = [
                    {d: "Đợt 1 (Ký HĐMB)", p: 0.50, t: "T (trong 10 ngày từ cọc)"},
                    {d: "Đợt 2", p: 0.10, t: "T + 240 ngày"},
                    {d: "Đợt 3", p: 0.10, t: "T + 300 ngày"},
                    {d: "Đợt 4 (Bàn giao)", p: 0.25, t: "T + 360 ngày"},
                    {d: "Đợt 5 (GCN)", p: 0.05, t: "Theo TB của CĐT"}
                ];
            } else {
                steps = [
                    {d: "Đợt 1 (Ký HĐMB)", p: 0.50, t: "T"},
                    {d: "Đợt 2", p: 0.05, t: "T + 360 ngày"},
                    {d: "Đợt 3", p: 0.05, t: "T + 540 ngày"},
                    {d: "Đợt 4", p: 0.05, t: "T + 720 ngày"},
                    {d: "Đợt 5", p: 0.05, t: "T + 900 ngày"},
                    {d: "Đợt 6 (Bàn giao)", p: 0.25, t: "T + 36 tháng"},
                    {d: "Đợt 7 (GCN)", p: 0.05, t: "Theo TB của CĐT"}
                ];
            }
        } else {
            // Nhóm 1PN hoặc 2PN nhưng
