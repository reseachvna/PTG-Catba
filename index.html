<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng thông tin phiếu tính giá</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; color: #000000; }
        .container { max-width: 900px; margin: 50px auto; text-align: center; }
        h1 { font-size: 24px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        h2 { font-size: 22px; font-weight: normal; margin-top: 0; margin-bottom: 20px; }
        #data-status { font-style: italic; font-weight: bold; margin-bottom: 30px; }
        .form-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 40px; }
        .form-fields { display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; align-items: center; justify-content: flex-end; }
        .form-group label { font-size: 20px; margin-right: 20px; }
        .form-group input, .form-group select { width: 320px; height: 40px; border: 1px solid #000; font-size: 16px; padding: 0 10px; box-sizing: border-box; outline: none; }
        .form-group select:focus { border-color: #1b6329; border-width: 1.5px; }
        .btn-submit { background-color: #dbe4f4; color: #1a365d; border: none; padding: 15px 30px; border-radius: 25px; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background-color: #c8d6ed; }
        #result-box { display: none; text-align: left; background: #f9f9f9; padding: 30px; border: 1px solid #ddd; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px dashed #ccc; padding-bottom: 8px; font-size: 18px; }
        .info-row strong { color: #1a365d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff; }
        table, th, td { border: 1px solid #aaa; }
        th, td { padding: 12px; text-align: center; font-size: 16px; }
        th { background-color: #dbe4f4; color: #1a365d; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bảng thông tin phiếu tính giá</h1>
        <h2>Dự án Flamingo Cát Bà Beach Resort</h2>
        
        <div id="data-status" style="color: #888;">Đang kết nối dữ liệu...</div>

        <div class="form-wrapper">
            <div class="form-fields">
                <div class="form-group">
                    <label for="fullname">Họ và Tên Khách hàng</label>
                    <input type="text" id="fullname" placeholder="Nhập tên khách hàng...">
                </div>
                <div class="form-group">
                    <label for="apartment-code">Mã căn hộ</label>
                    <input type="text" id="apartment-code" placeholder="Ví dụ: V2.204...">
                </div>
                <div class="form-group">
                    <label for="payment-method">Lựa chọn phương án thanh toán</label>
                    <select id="payment-method">
                        <option value="12-thang">Phương án thanh toán 12 tháng</option>
                        <option value="36-thang">Phương án thanh toán 36 tháng</option>
                        <option value="30-ngay">Phương án thanh toán trong 30 ngày</option>
                        <option value="tts-50">Phương án TTS 50%</option>
                    </select>
                </div>
            </div>
            <div>
                <button type="button" class="btn-submit" onclick="xuLyTinhGia()">Tạo phiếu tính giá</button>
            </div>
        </div>

        <div id="result-box">
            <h3 style="text-align: center; color: #1a365d; margin-top: 0; font-size: 22px;">CHI TIẾT PHIẾU TÍNH GIÁ</h3>
            <div class="info-row"><span>Khách hàng:</span> <strong id="res-name"></strong></div>
            <div class="info-row"><span>Mã căn hộ:</span> <strong id="res-code"></strong></div>
            <div class="info-row"><span>Loại căn:</span> <strong id="res-type"></strong></div>
            <div class="info-row"><span>Diện tích:</span> <strong id="res-area"></strong></div>
            <div class="info-row"><span>Giá bán gốc:</span> <strong id="res-original-price"></strong></div>
            <div class="info-row"><span>Mức chiết khấu:</span> <strong id="res-discount-rate"></strong></div>
            <div class="info-row"><span>Giá trị chiết khấu:</span> <strong id="res-discount-amount"></strong></div>
            <div class="info-row" style="background-color: #fff3f3; padding: 10px; border: 1px solid #ffcccc; margin-top: 15px;">
                <span><strong>GIÁ BÁN SAU CHIẾT KHẤU:</strong></span> 
                <strong id="res-final-price" style="color: red; font-size: 1.3em;"></strong>
            </div>
            
            <h4 style="margin-top: 30px; font-size: 18px; color: #1a365d;">Tiến độ thanh toán chi tiết</h4>
            <table>
                <thead>
                    <tr><th>Đợt</th><th>Tỷ lệ (%)</th><th>Số tiền (VNĐ)</th></tr>
                </thead>
                <tbody id="payment-schedule"></tbody>
            </table>
        </div>
    </div>

    <script>
        let dataCanHo = [];

        window.onload = function() {
            // Thêm đuôi "?v=1" để ép trình duyệt không dùng cache cũ
            fetch('Data.json?v=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error("Lỗi mạng 404");
                    return response.json();
                })
                .then(data => {
                    dataCanHo = data;
                    document.getElementById('data-status').innerText = "Đã kết nối thành công với kho dữ liệu (Phiên bản chống Cache)!";
                    document.getElementById('data-status').style.color = "green";
                })
                .catch(error => {
                    document.getElementById('data-status').innerText = "LỖI: Không kết nối được dữ liệu!";
                    document.getElementById('data-status').style.color = "red";
                });
        };

        const formatVND = (number) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(number);
        };

        // Hàm hỗ trợ tìm đúng tên cột dù có bị dính khoảng trắng
        const layGiaTriCot = (item, tenCotCanTim) => {
            const keyThucTe = Object.keys(item).find(k => k.trim() === tenCotCanTim);
            return keyThucTe ? item[keyThucTe] : null;
        };

        window.xuLyTinhGia = function() {
            const tenKhachHang = document.getElementById('fullname').value;
            const maCanHoNhap = document.getElementById('apartment-code').value.toUpperCase().trim();
            const phuongAn = document.getElementById('payment-method').value;

            if (!dataCanHo) {
                alert("Hệ thống chưa tải được dữ liệu.");
                return;
            }

            // --- BƯỚC XỬ LÝ DỮ LIỆU ĐA NĂNG ---
            let dataList = dataCanHo;
            // Nếu data là dạng Object {"Sheet1": [...] } thì bóc lấy mảng bên trong
            if (!Array.isArray(dataList)) {
                const keys = Object.keys(dataList);
                dataList = dataList[keys[0]]; 
            }

            if (!dataList || dataList.length === 0) {
                alert("File Data.json rỗng hoặc sai cấu trúc!");
                return;
            }

            if (!maCanHoNhap) {
                alert("Vui lòng nhập mã căn hộ!");
                return;
            }

            // --- TÌM KIẾM THÔNG MINH (Bỏ qua mọi khoảng trắng thừa) ---
            const thongTinCanHo = dataList.find(item => {
                const giaTriMaCan = layGiaTriCot(item, "ma_can");
                if (giaTriMaCan) {
                    return String(giaTriMaCan).toUpperCase().trim() === maCanHoNhap;
                }
                return false;
            });

            // NẾU TÌM KHÔNG THẤY: HIỂN THỊ LUÔN DỮ LIỆU ĐANG BỊ LỖI CHO NGƯỜI DÙNG XEM
            if (!thongTinCanHo) {
                const mauJson = JSON.stringify(dataList[0], null, 2);
                alert("Không tìm thấy mã: " + maCanHoNhap + "\n\n--- THÔNG TIN GỠ LỖI ---\nDữ liệu đầu tiên mà web đọc được là:\n" + mauJson + "\n\nHãy kiểm tra xem chữ 'ma_can' có viết đúng không nhé!");
                document.getElementById('result-box').style.display = 'none';
                return;
            }

            // Lấy dữ liệu an toàn
            const giaGoc = Number(layGiaTriCot(thongTinCanHo, "gia_tien")) || 0;
            const loaiCan = layGiaTriCot(thongTinCanHo, "Type") || "Không xác định";
            const dienTich = layGiaTriCot(thongTinCanHo, "dien_tich") || 0;

            if(giaGoc === 0) {
                alert("Lỗi: Không đọc được cột 'gia_tien'. Hãy đảm bảo nó là số nguyên (không có dấu phẩy) trong file JSON!");
                return;
            }

            // Tính toán
            let tyLeChietKhau = 0; 
            if (phuongAn === '30-ngay') tyLeChietKhau = 0.10;
            else if (phuongAn === 'tts-50') tyLeChietKhau = 0.05;
            else if (phuongAn === '12-thang') tyLeChietKhau = 0.02;
            else if (phuongAn === '36-thang') tyLeChietKhau = 0;

            const giaTriChietKhau = giaGoc * tyLeChietKhau;
            const giaSauChietKhau = giaGoc - giaTriChietKhau;

            let soDot = 1;
            if (phuongAn === '30-ngay') soDot = 1;
            else if (phuongAn === 'tts-50') soDot = 2;
            else if (phuongAn === '12-thang') soDot = 12;
            else if (phuongAn === '36-thang') soDot = 36;

            const tyLeMoiDot = 100 / soDot;
            const tienMoiDot = giaSauChietKhau / soDot;

            // In ra giao diện
            document.getElementById('res-name').innerText = tenKhachHang || "Khách lẻ";
            document.getElementById('res-code').innerText = layGiaTriCot(thongTinCanHo, "ma_can");
            document.getElementById('res-type').innerText = loaiCan;
            document.getElementById('res-area').innerText = dienTich + " m2"; 
            
            document.getElementById('res-original-price').innerText = formatVND(giaGoc);
            document.getElementById('res-discount-rate').innerText = (tyLeChietKhau * 100) + "%";
            document.getElementById('res-discount-amount').innerText = formatVND(giaTriChietKhau);
            document.getElementById('res-final-price').innerText = formatVND(giaSauChietKhau);

            const tbody = document.getElementById('payment-schedule');
            tbody.innerHTML = ""; 
            for (let i = 1; i <= soDot; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>Đợt ${i}</td><td>${tyLeMoiDot.toFixed(2)}%</td><td>${formatVND(tienMoiDot)}</td>`;
                tbody.appendChild(tr);
            }

            document.getElementById('result-box').style.display = 'block';
        };
    </script>
</body>
</html>
