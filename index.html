<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Tính Giá Flamingo Cát Bà - Ver 1.0 </title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; margin: 0; padding: 30px;}
        
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        h1 { color: #1a365d; text-transform: uppercase; margin-bottom: 5px; font-size: 26px; text-align: center;}
        h2 { color: #2d3748; font-weight: normal; margin-top: 0; margin-bottom: 30px; font-size: 20px; text-align: center;}
        
        #data-status { font-weight: bold; margin-bottom: 25px; padding: 10px; border-radius: 6px; display: inline-block; background: #f1f5f9; text-align: center;}

        /* Form styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: left; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #4a5568; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 16px; outline: none; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #1a365d; box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1); }

        .full-width { grid-column: span 3; }
        .mode-selector { background: #edf2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 30px; align-items: center; justify-content: center; }
        .mode-selector label { cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        /* Custom Discount Table */
        .custom-discount-box { background: #fffaf0; border: 1px dashed #ed8936; padding: 20px; border-radius: 8px; margin-top: 10px; display: none; }
        .custom-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .custom-table input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-add { background: #2b6cb0; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-remove { background: #e53e3e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;}

        .btn-main { background: #1a365d; color: white; border: none; padding: 18px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-main:hover { background: #2c5282; transform: translateY(-2px); }

        /* Print Button */
        .btn-print { background: #38a169; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-print:hover { background: #2f855a; }
        .print-header-actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a365d; margin-bottom: 20px; padding-bottom: 10px; }

        /* Result styling */
        #result-box { display: none; margin-top: 40px; padding-top: 30px; border-top: 2px solid #edf2f7; text-align: left; }
        .result-header { color: #1a365d; margin: 0; font-size: 22px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .info-item span { color: #718096; }
        .info-item strong { color: #2d3748; }
        
        .price-highlight { background: #fff5f5; padding: 20px; border-radius: 8px; border: 1px solid #feb2b2; margin-bottom: 30px; }
        .final-price { color: #e53e3e; font-size: 28px; font-weight: bold; }
        .discount-detail { font-size: 15px; color: #4a5568; margin-top: 10px; padding-left: 20px; border-left: 3px solid #1a365d; }

        .milestone-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .milestone { background: #ebf8ff; padding: 15px; border-left: 5px solid #3182ce; border-radius: 4px; }
        
        table.schedule-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        .schedule-table th { background: #1a365d; color: white; padding: 12px; border: 1px solid #1a365d; text-align: center; }
        .schedule-table td { border: 1px solid #cbd5e0; padding: 12px; vertical-align: middle; }
        .schedule-table tr:nth-child(even) { background: #f7fafc; }
        .td-center { text-align: center; }
        .td-right { text-align: right; }

        /* ========================================= */
        /* CSS DÀNH RIÊNG CHO KHI BẤM NÚT TẢI PDF/IN */
        /* ========================================= */
        @media print {
            body { background: #fff; padding: 0; margin: 0; }
            .container { box-shadow: none; border-radius: 0; padding: 20px 0; max-width: 100%; margin: 0; }
            
            /* Giấu tất cả các thẻ không cần thiết khi in */
            .no-print, .mode-selector, .form-grid, .btn-main, #custom-discount-box, #data-status { display: none !important; }
            
            #result-box { display: block !important; border: none; margin-top: 0; padding-top: 0; }
            .price-highlight { border: 1px solid #ccc; background: #fff; } 
            
            /* Ép trình duyệt in đúng màu nền của bảng */
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;" class="no-print">
        <h1>Bảng tính giá & Tiến độ thanh toán</h1>
        <h2>Dự án Flamingo Cát Bà Beach Resort</h2>
        <div id="data-status">⏳ Đang khởi động hệ thống...</div>
    </div>

    <div class="mode-selector no-print">
        <label><input type="radio" name="calc-mode" value="auto" checked onchange="toggleMode()"> TÍNH TỰ ĐỘNG (FLOW CHUẨN)</label>
        <label><input type="radio" name="calc-mode" value="custom" onchange="toggleMode()"> TÙY CHỈNH NGOẠI GIAO</label>
    </div>

    <div class="form-grid no-print">
        <div class="form-group">
            <label>Tên khách hàng</label>
            <input type="text" id="fullname" placeholder="Họ và tên...">
        </div>
        <div class="form-group">
            <label>Mã căn hộ</label>
            <input type="text" id="apt-code" placeholder="Ví dụ: V2.204">
        </div>
        <div class="form-group">
            <label>Ngày đặt cọc</label>
            <input type="date" id="deposit-date">
        </div>
        
        <div class="form-group">
            <label>Nhóm sản phẩm</label>
            <select id="apt-group" onchange="checkSpecialConditions()">
                <option value="1PN">Căn Khách sạn / Studio / 1PN</option>
                <option value="2PN">Căn hộ 2PN / 3PN</option>
            </select>
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>Phương thức thanh toán</label
